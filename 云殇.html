<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>云殇</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Microsoft YaHei', sans-serif;
            background: #000;
        }

        .slideshow-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            transition: filter 2.5s ease-out, opacity 2.5s ease-out;
        }

        .slideshow-container.warping {
            filter: blur(30px) brightness(3);
            opacity: 0;
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
            will-change: transform, opacity;
        }

        .slide.active {
            opacity: 1;
        }

        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            overflow: hidden;
            transition: opacity 2s ease-out;
        }

        .particles.warping {
            opacity: 0;
        }

        .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            animation: float linear infinite;
            box-shadow: 0 0 6px rgba(255, 255, 255, 0.4);
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) translateX(0) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
                transform: translateY(90vh) translateX(20px) scale(1);
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-10vh) translateX(-30px) scale(0.5);
                opacity: 0;
            }
        }

        .glow-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 0%, rgba(0, 0, 0, 0.3) 100%);
            z-index: 5;
            pointer-events: none;
            animation: pulseGlow 4s ease-in-out infinite alternate;
        }

        @keyframes pulseGlow {
            0% { opacity: 0.5; transform: scale(1); }
            100% { opacity: 0.8; transform: scale(1.05); }
        }

        .title {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
            color: #fff;
            text-align: center;
            text-shadow: 0 0 20px rgba(0, 0, 0, 0.8), 0 0 40px rgba(0, 0, 0, 0.6), 0 0 80px rgba(0, 0, 0, 0.4);
            animation: titleFade 2s ease-in-out infinite alternate;
            transition: transform 0.3s ease, filter 2s ease-out, opacity 2s ease-out;
            cursor: pointer;
            user-select: none;
        }

        .title.warping {
            filter: blur(15px);
            opacity: 0;
            transform: translate(-50%, -50%) scale(1.5);
        }

        .title:hover {
            transform: translate(-50%, -50%) scale(1.05);
        }

        .title h1 {
            font-size: 4rem;
            font-weight: 300;
            letter-spacing: 1rem;
            margin-bottom: 1rem;
            opacity: 1;
        }

        .title p {
            font-size: 1.2rem;
            letter-spacing: 0.5rem;
            opacity: 1;
            font-weight: 300;
        }

        @keyframes titleFade {
            0% { opacity: 0.85; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 1; transform: translate(-50%, -50%) scale(1.02); }
        }

        /* ========== 时空穿梭转场特效 ========== */
        .warp-transition {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 9999;
            pointer-events: none;
            opacity: 0;
            overflow: hidden;
            transition: opacity 0.5s ease;
        }

        .warp-transition.active {
            pointer-events: all;
            opacity: 1;
        }

        /* 转场背景图 */
        .warp-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('2.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 1;
            opacity: 0;
            transition: opacity 1.5s ease;
        }

        .warp-bg.active {
            opacity: 1;
        }

        .warp-bg.fade-out {
            opacity: 0;
            transition: opacity 1s ease;
        }

        /* 转场背景暗化遮罩 */
        .warp-bg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 2;
            opacity: 0;
            transition: opacity 1.5s ease;
        }

        .warp-bg-overlay.active {
            opacity: 1;
        }

        .warp-bg-overlay.fade-out {
            opacity: 0;
            transition: opacity 1s ease;
        }

        /* 转场打字机文本 */
        .warp-typewriter {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
            text-align: center;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .warp-typewriter.active {
            opacity: 1;
        }

        .warp-typewriter .type-content {
            color: rgba(200, 230, 255, 0.9);
            font-size: 1.3rem;
            letter-spacing: 0.2rem;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 10px rgba(100, 200, 255, 0.5);
            line-height: 2;
            white-space: pre-wrap;
            text-align: center;
        }

        .warp-typewriter .type-content .cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background: rgba(100, 200, 255, 0.8);
            margin-left: 2px;
            vertical-align: text-bottom;
            animation: blinkCursor 0.8s step-end infinite;
            transition: opacity 0.5s ease;
        }

        .warp-typewriter .type-content .cursor.fade-out {
            animation: none;
            opacity: 0;
        }

        @keyframes blinkCursor {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* 核心白光束 */
        .core-beam {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 255, 255, 1) 0%, rgba(255, 255, 255, 0.9) 20%, rgba(200, 230, 255, 0.6) 50%, rgba(100, 200, 255, 0.2) 70%, transparent 100%);
            transform: translate(-50%, -50%);
            z-index: 5;
            opacity: 0;
        }

        .core-beam.active {
            animation: beamExpand 2.5s ease-out forwards;
        }

        @keyframes beamExpand {
            0% {
                width: 0;
                height: 0;
                opacity: 0;
            }
            10% {
                width: 50px;
                height: 50px;
                opacity: 0.8;
            }
            40% {
                width: 800px;
                height: 800px;
                opacity: 1;
            }
            70% {
                width: 3000px;
                height: 3000px;
                opacity: 1;
            }
            100% {
                width: 5000px;
                height: 5000px;
                opacity: 1;
            }
        }

        /* 全屏白芒 */
        .full-whiteout {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fff;
            opacity: 0;
            z-index: 6;
            transition: opacity 0.3s ease-out;
        }

        .full-whiteout.active {
            opacity: 1;
        }

        .full-whiteout.fade-out {
            opacity: 0;
            transition: opacity 2s ease-out;
        }

        /* ========== 第二页面 ========== */
        .page-two {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 100;
            display: none;
            overflow: hidden;
        }

        .page-two.active {
            display: block;
        }

        /* 第二页背景图 */
        .page-two-bg-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('3.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 1;
            opacity: 0;
            transition: opacity 2s ease-out;
        }

        .page-two-bg-img.show {
            opacity: 1;
        }

        /* 第二页渐变叠加 */
        .page-two-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(0, 100, 200, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 50%, rgba(100, 0, 200, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(0, 50, 100, 0.3) 0%, transparent 70%);
            z-index: 2;
            opacity: 0;
            transition: opacity 2s ease-out;
        }

        .page-two-overlay.show {
            opacity: 1;
        }

        .page-two-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 150, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 150, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
            z-index: 3;
            opacity: 0;
            transition: opacity 2s ease-out;
        }

        .page-two-grid.show {
            opacity: 1;
        }

        @keyframes gridMove {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
        }

        .page-two-content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #fff;
            text-align: center;
            padding: 0 20px;
        }

        /* 第二页标题 - 无光标 */
        .page-two-content h2 {
            font-size: 3rem;
            font-weight: 300;
            letter-spacing: 1rem;
            margin-bottom: 2rem;
            text-shadow: 0 0 30px rgba(100, 200, 255, 0.5);
            font-family: 'Microsoft YaHei', sans-serif;
            opacity: 0;
            transition: opacity 1.5s ease-out;
        }

        .page-two-content h2.show {
            opacity: 1;
        }

        /* 第二页打字机段落 */
        .page-two-content .poem-container {
            margin: 1rem 0;
            text-align: center;
            opacity: 0;
            transition: opacity 0.8s ease-out;
        }

        .page-two-content .poem-container.show {
            opacity: 1;
        }

        .page-two-content .poem-text {
            font-size: 1.1rem;
            letter-spacing: 0.3rem;
            opacity: 0.85;
            line-height: 2.2;
            font-family: 'Courier New', monospace;
            color: rgba(200, 230, 255, 0.85);
            text-shadow: 0 0 8px rgba(100, 200, 255, 0.3);
            white-space: pre-wrap;
            text-align: center;
        }

        .page-two-content .poem-text .cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background: rgba(100, 200, 255, 0.6);
            margin-left: 2px;
            vertical-align: text-bottom;
            animation: blinkCursor 0.8s step-end infinite;
            transition: opacity 0.5s ease;
        }

        .page-two-content .poem-text .cursor.fade-out {
            animation: none;
            opacity: 0;
        }

        .back-btn {
            margin-top: 3rem;
            padding: 12px 40px;
            background: transparent;
            border: 1px solid rgba(100, 200, 255, 0.5);
            color: #fff;
            font-size: 1rem;
            letter-spacing: 0.3rem;
            cursor: pointer;
            transition: all 0.3s ease;
            opacity: 0;
            transform: translateY(20px);
        }

        .back-btn.show {
            opacity: 1;
            transform: translateY(0);
            transition: all 0.8s ease-out;
        }

        .back-btn:hover {
            background: rgba(100, 200, 255, 0.1);
            border-color: rgba(100, 200, 255, 0.8);
            box-shadow: 0 0 20px rgba(100, 200, 255, 0.3);
        }

        @media (max-width: 768px) {
            .title h1 { font-size: 2.5rem; letter-spacing: 0.5rem; }
            .title p { font-size: 1rem; letter-spacing: 0.3rem; }
            .page-two-content h2 { font-size: 2rem; letter-spacing: 0.5rem; }
            .warp-typewriter .type-content { font-size: 1rem; }
            .page-two-content .poem-text { font-size: 0.9rem; letter-spacing: 0.2rem; }
        }
    </style>
<base target="_blank">
</head>
<body>
    <!-- 第一页面 -->
    <div class="slideshow-container" id="pageOne">
        <div class="slide active" style="background-image: url('(1).jpg');"></div>
        <div class="slide" style="background-image: url('(2).jpg');"></div>
        <div class="slide" style="background-image: url('(3).jpg');"></div>
        <div class="slide" style="background-image: url('(4).jpg');"></div>
        <div class="slide" style="background-image: url('1.jpg');"></div>

        <div class="particles" id="particles"></div>
        <div class="glow-overlay"></div>

        <div class="title" id="titleClick">
            <h1>云殇</h1>
            <p>云端之上 · 岁月如殇</p>
        </div>
    </div>

    <!-- 时空穿梭转场 -->
    <div class="warp-transition" id="warpTransition">
        <!-- 转场背景图 -->
        <div class="warp-bg" id="warpBg"></div>
        <div class="warp-bg-overlay" id="warpBgOverlay"></div>
        <!-- 核心白光束 -->
        <div class="core-beam" id="coreBeam"></div>
        <!-- 全屏白芒 -->
        <div class="full-whiteout" id="fullWhiteout"></div>
        <!-- 打字机文本 -->
        <div class="warp-typewriter" id="warpTypewriter">
            <div class="type-content" id="warpTypeContent"><span class="cursor" id="warpCursor"></span></div>
        </div>
    </div>

    <!-- 第二页面 -->
    <div class="page-two" id="pageTwo">
        <!-- 第二页背景图 -->
        <div class="page-two-bg-img" id="pageTwoBgImg"></div>
        <div class="page-two-overlay" id="pageTwoOverlay"></div>
        <div class="page-two-grid" id="pageTwoGrid"></div>
        <div class="page-two-content">
            <h2 id="pageTwoTitle">星际纪元</h2>
            <div class="poem-container" id="poemContainer">
                <div class="poem-text" id="poemText"><span class="cursor" id="poemCursor"></span></div>
            </div>
            <button class="back-btn" id="backBtn">返回原点</button>
        </div>
    </div>

    <script>
        (function() {
            // ========== 第一页面幻灯片 ==========
            const slides = document.querySelectorAll('.slide');
            const particlesContainer = document.getElementById('particles');
            const totalSlides = slides.length;
            let currentIndex = 0;
            const slideDuration = 5000;

            function createParticles() {
                const particleCount = 30;
                for (let i = 0; i < particleCount; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'particle';
                    const size = Math.random() * 4 + 2;
                    particle.style.width = size + 'px';
                    particle.style.height = size + 'px';
                    particle.style.left = Math.random() * 100 + '%';
                    particle.style.animationDuration = (Math.random() * 10 + 8) + 's';
                    particle.style.animationDelay = (Math.random() * 5) + 's';
                    particle.style.opacity = Math.random() * 0.5 + 0.2;
                    particlesContainer.appendChild(particle);
                }
            }

            function goToSlide(index) {
                slides[currentIndex].classList.remove('active');
                currentIndex = index;
                slides[currentIndex].classList.add('active');
            }

            function nextSlide() {
                const nextIndex = (currentIndex + 1) % totalSlides;
                goToSlide(nextIndex);
            }

            function startAutoPlay() {
                setInterval(nextSlide, slideDuration);
            }

            createParticles();
            startAutoPlay();

            // ========== 打字机效果工具函数 ==========
            function typeWriter(element, cursor, lines, speed, lineDelay, onComplete) {
                let lineIndex = 0;
                let charIndex = 0;
                let currentText = '';

                function type() {
                    if (lineIndex >= lines.length) {
                        cursor.classList.add('fade-out');
                        setTimeout(function() {
                            if (onComplete) onComplete();
                        }, 500);
                        return;
                    }

                    const line = lines[lineIndex];

                    if (charIndex < line.length) {
                        currentText += line.charAt(charIndex);
                        element.textContent = currentText;
                        element.appendChild(cursor);
                        charIndex++;
                        setTimeout(type, speed);
                    } else {
                        currentText += '\n';
                        element.textContent = currentText;
                        element.appendChild(cursor);
                        lineIndex++;
                        charIndex = 0;
                        setTimeout(type, lineDelay);
                    }
                }
                type();
            }

            function calcTypeDuration(lines, speed, lineDelay) {
                let total = 0;
                for (let i = 0; i < lines.length; i++) {
                    total += lines[i].length * speed;
                    if (i < lines.length - 1) {
                        total += lineDelay;
                    }
                }
                return total;
            }

            // ========== 时空穿梭转场 ==========
            const titleClick = document.getElementById('titleClick');
            const warpTransition = document.getElementById('warpTransition');
            const warpBg = document.getElementById('warpBg');
            const warpBgOverlay = document.getElementById('warpBgOverlay');
            const warpTypewriter = document.getElementById('warpTypewriter');
            const warpTypeContent = document.getElementById('warpTypeContent');
            const warpCursor = document.getElementById('warpCursor');
            const coreBeam = document.getElementById('coreBeam');
            const fullWhiteout = document.getElementById('fullWhiteout');
            const pageTwo = document.getElementById('pageTwo');
            const pageTwoBgImg = document.getElementById('pageTwoBgImg');
            const pageTwoOverlay = document.getElementById('pageTwoOverlay');
            const pageTwoGrid = document.getElementById('pageTwoGrid');
            const backBtn = document.getElementById('backBtn');
            const pageOne = document.getElementById('pageOne');
            const pageTwoTitle = document.getElementById('pageTwoTitle');
            const poemContainer = document.getElementById('poemContainer');
            const poemText = document.getElementById('poemText');
            const poemCursor = document.getElementById('poemCursor');

            const warpLines = [
                '正在锁定坐标信息',
                '坐标已锁定',
                '正在启动曲率引擎',
                '目标：枢纽星系云殇总部'
            ];

            const poemLines = [
                '穿越万千星河，抵达未知彼岸',
                '这里是时间的尽头，也是新的开始',
                '每一颗星辰都承载着过往的记忆',
                '每一次跃迁都是命运的抉择'
            ];

            titleClick.addEventListener('click', function() {
                const warpTypeTime = calcTypeDuration(warpLines, 120, 600);
                const poemTypeTime = calcTypeDuration(poemLines, 150, 800);

                // 第一阶段：背景和文字虚化变白
                pageOne.classList.add('warping');
                titleClick.classList.add('warping');
                particlesContainer.classList.add('warping');

                // 第二阶段：显示转场背景图 + 打字机文本
                setTimeout(function() {
                    warpTransition.classList.add('active');
                    warpBg.classList.add('active');
                    warpBgOverlay.classList.add('active');
                    warpTypewriter.classList.add('active');

                    typeWriter(warpTypeContent, warpCursor, warpLines, 120, 600, function() {
                        // 文本打完后，转场背景淡出
                        warpBg.classList.add('fade-out');
                        warpBgOverlay.classList.add('fade-out');
                        warpTypewriter.style.opacity = '0';

                        // 背景淡出后，启动白光束效果
                        setTimeout(function() {
                            coreBeam.classList.add('active');

                            // 光束铺满后，全屏白芒
                            setTimeout(function() {
                                fullWhiteout.classList.add('active');
                            }, 800);

                            // 白芒持续一段时间后，开始淡出
                            setTimeout(function() {
                                // 先显示第二页背景（在白光下准备）
                                pageOne.style.display = 'none';
                                pageOne.classList.remove('warping');
                                titleClick.classList.remove('warping');
                                particlesContainer.classList.remove('warping');
                                pageTwo.classList.add('active');
                                pageTwoBgImg.classList.add('show');
                                pageTwoOverlay.classList.add('show');
                                pageTwoGrid.classList.add('show');

                                // 白光渐渐消失，露出第二页背景
                                fullWhiteout.classList.add('fade-out');
                                coreBeam.classList.remove('active');

                                // 背景完全显示后，淡入标题
                                setTimeout(function() {
                                    pageTwoTitle.classList.add('show');

                                    // 标题显示后，诗句容器淡入并开始打字
                                    setTimeout(function() {
                                        poemContainer.classList.add('show');
                                        typeWriter(poemText, poemCursor, poemLines, 150, 800);
                                    }, 1500);

                                    // 返回按钮
                                    const backBtnDelay = 1500 + poemTypeTime + 1500;
                                    setTimeout(function() {
                                        backBtn.classList.add('show');
                                    }, backBtnDelay);
                                }, 2000);

                                // 清理转场
                                setTimeout(function() {
                                    warpTransition.classList.remove('active');
                                    warpBg.classList.remove('active');
                                    warpBg.classList.remove('fade-out');
                                    warpBgOverlay.classList.remove('active');
                                    warpBgOverlay.classList.remove('fade-out');
                                    warpTypewriter.classList.remove('active');
                                    warpTypewriter.style.opacity = '';
                                    warpTypeContent.textContent = '';
                                    warpCursor.classList.remove('fade-out');
                                    fullWhiteout.classList.remove('active');
                                    fullWhiteout.classList.remove('fade-out');
                                }, 2500);
                            }, 1500);
                        }, 1000);
                    });
                }, 2500);
            });

            // 返回按钮
            backBtn.addEventListener('click', function() {
                pageTwo.classList.remove('active');
                pageTwoBgImg.classList.remove('show');
                pageTwoOverlay.classList.remove('show');
                pageTwoGrid.classList.remove('show');
                pageTwoTitle.classList.remove('show');
                poemContainer.classList.remove('show');
                poemText.textContent = '';
                poemCursor.classList.remove('fade-out');
                backBtn.classList.remove('show');
                pageOne.style.display = 'block';
                slides.forEach(s => s.classList.remove('active'));
                currentIndex = 0;
                slides[0].classList.add('active');
            });
        })();
    </script>
</body>
</html>
